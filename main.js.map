<div
  class="card"
  [ngClass]="{
    soon: category === 'coming-up',
    today: category === 'today',
    history: category === 'history',
    new: isNew
  }"
>
  <div class="market-action">
    <img class="left-image" [src]="leftImageSrc" alt="" />
    <img class="right-image" [src]="rightImageSrc" alt="" />
  </div>

  <div class="card-tradingpair">
    <img [src]="data.imgSrc" alt="" />
    <span class="trading-pair-card-text"> {{ data.tradingPair }} </span>
  </div>

  <div class="card-text">
    <div class="card-text-top">
      <span class="make-a-trade-card-text">Make a trade</span><br>
      <span [ngClass]="getTextColorClass()">
        <b>{{ data.leverage }}x {{ data.action }}</b> 
        at 
        <b>${{ data.entryPrice }}</b>
        sell 
        <b>${{ data.exitPrice }}</b>
      </span>
    </div>
  </div>
</div>
