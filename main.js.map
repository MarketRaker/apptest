<div class="container">
  <div class="filter-buttons">
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg" 
      [class.active]="showComingUp" 
      (click)="toggleSection('comingUp')"
    >
      Coming Up
    </button>
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg" 
      [class.active]="showToday" 
      (click)="toggleSection('today')"
    >
      Today
    </button>
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg" 
      [class.active]="showHistory" 
      (click)="toggleSection('history')"
    >
      History
    </button>
  </div>

  <div class="indicators-container">
    <div class="coming-up" *ngIf="showComingUp">
      <div class="card-container">
        <ng-container *ngFor="let indicator of comingUpIndicators">
          <app-indicator 
            *ngIf="showComingUp" 
            [data]="indicator">
          </app-indicator>
        </ng-container>
      </div>
    </div>
  
    <div class="today" *ngIf="showToday">
      <div class="card-container">
        <ng-container *ngFor="let indicator of todayIndicators">
          <app-indicator 
            *ngIf="showToday" 
            [data]="indicator">
          </app-indicator>
        </ng-container>
      </div>
    </div>
  
    <div class="history" *ngIf="showHistory">
      <div class="card-container">
        <ng-container *ngFor="let indicator of historyIndicators">
          <app-indicator 
          *ngIf="showHistory" 
          [data]="indicator">
        </app-indicator>
        </ng-container>
      </div>
    </div>
  </div>
</div>

<div class="actions">
  <button
    routerLink="/registration/trading-pairs"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Back
  </button>
  <button
    routerLink="/registration/register"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Next
  </button>
</div>
