<div class="container">
  <div class="header">
    <h1>Add Your Trading Pairs</h1>
    <p>
      Choose the trading pairs for which you would like to receive long and
      short indicators based on your risk tolerance.
    </p>
  </div>

  <div class="mobile">
    <app-scroll-list>
      <app-trade-pair-card
        *ngFor="let card of cards"
        [card]="card"
        (selected)="select($event)"
      >
      </app-trade-pair-card>
    </app-scroll-list>
  </div>

  <div class="desktop">
    <div class="carousel-container-wrapper">
      <button mat-icon-button (click)="onPrevClick()">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <div class="carousel-container">
        <div class="carousel-wrapper">
          <div class="carousel" #carousel>
            <ng-container *ngFor="let group of cardGroups">
              <div class="carousel-slide">
                <div class="card-group">
                  <app-trade-pair-card
                    *ngFor="let card of group"
                    [card]="card"
                    (selected)="select($event)"
                  >
                  </app-trade-pair-card>
                </div>
              </div>
            </ng-container>
          </div>
        </div>
      </div>
      <button mat-icon-button (click)="onNextClick()">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  </div>
</div>

<div class="actions">
  <button
    routerLink="/registration/risk-appetite"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Back
  </button>
  <!---->
  <button
    routerLink="/registration/discover"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
    [disabled]="!hasSelectedCards"
  >
    Next
  </button>
</div>
