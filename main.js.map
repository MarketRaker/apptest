<div class="container">
  <div class="header">
    <!-- HEADING -->
    <h1>What is your Risk Appetite?</h1>
  </div>

  <app-risk-appetite-selector
    [riskAppetiteScore]="riskAppetiteScore"
      (riskAppetiteScoreChanged)="updateRiskAppetiteScore($event)"
    ></app-risk-appetite-selector>
</div>
<div class="actions">
  <button
    routerLink="/home"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Back
  </button>
  <button
    routerLink="/registration/trading-pairs"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Next
  </button>
</div>
