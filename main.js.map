<div class="container">
  <div class="img-container">
    <img src="../../../../assets/images/LOGO-KLEUR.svg" alt="" />
  </div>

  <h1>Welcome back</h1>

  <div class="signup-container">
    <p>Log in with your</p>
    <button
      class="btn-google-account"
      matRipple
      [matRippleColor]="'hsl(180, 26%, 22%, 0.25)'"
      (click)="
        auth.loginWithRedirect({
          authorizationParams: { connection: 'google-oauth2' },
          appState: { target: redirectURL }
        })
      "
    >
      <img src="../../../../../assets/images/google.png" alt="" />
      Google Account
    </button>
  </div>
  <div class="divider">
    <span>Or log in with</span>
  </div>

  <div class="icon-container">
    <a
      href="https://www.linkedin.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div
        class="icon-wrapper"
        matRipple
        [matRippleColor]="'rgba(0, 0, 0, 0.1)'"
      >
        <fa-icon size="3x" color="#007BB6" [icon]="faLinkedin"></fa-icon>
      </div>
    </a>
    <a
      href="https://www.facebook.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div
        class="icon-wrapper"
        matRipple
        [matRippleColor]="'rgba(0, 0, 0, 0.1)'"
      >
        <fa-icon size="3x" [icon]="faFacebook"></fa-icon>
      </div>
    </a>
  </div>

  <div class="signup-email-text">Log in by using your email address</div>

  <div class="already-have-account-text">
    Not registered yet? Register
    <a routerLink="/registration/risk-appetite">here</a>
  </div>
</div>
