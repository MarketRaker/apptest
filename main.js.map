<div class="group">
  <div class="mobile-navigation">
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>
    <a routerLink="/" class="brand-name">MARKET<span>RAKER</span> </a>
  </div>

  <img class="logo" src="assets/images/LOGO WIT-presies-sonder text.svg" />
  <nav class="navigation">
    <a
      *ngIf="!loggedIn"
      routerLink="/"
      routerLinkActive="active"
      class="menu-item"
      >Home</a
    >
    <a
      *ngIf="!loggedIn"
      routerLink="/about"
      routerLinkActive="active"
      class="menu-item"
      >About</a
    >
    <a
      *ngIf="!loggedIn"
      routerLink="/connect"
      routerLinkActive="active"
      class="menu-item"
      >Connect</a
    >
    <a
      *ngIf="loggedIn"
      routerLink="/trade/indicators"
      routerLinkActive="active"
      class="menu-item"
      >Dashboard</a
    >
    <a
      *ngIf="loggedIn"
      routerLink="/discover"
      routerLinkActive="active"
      class="menu-item"
      >Discover</a
    >
    <a
      *ngIf="loggedIn"
      routerLink="/profile"
      routerLinkActive="active"
      class="menu-item"
      >My Profile</a
    >
  </nav>
</div>
<div class="fill"></div>
<div class="group">
  <ng-container *ngIf="!loggedIn">
    <button
      routerLink="/registration/risk-appetite"
      class="btn-outline btn-white ff-accent fs-md"
    >
      GET STARTED
    </button>
    <button routerLink="/login" class="btn-solid btn-white ff-accent fs-md">
      LOGIN
    </button>
  </ng-container>
  <ng-container *ngIf="loggedIn">
    <button mat-icon-button>
      <mat-icon>notifications</mat-icon>
    </button>
    <button mat-icon-button [matMenuTriggerFor]="usermenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #usermenu="matMenu">
      <button mat-menu-item (click)="logout()">Log out</button>
    </mat-menu>
  </ng-container>
</div>
