<div class="carousel">
  <div class="arrow-text arrow left" (click)="previous()">
    <button mat-icon-button>
      <mat-icon>keyboard_arrow_left</mat-icon>
    </button>
  </div>
  <div class="number-container">
    <div
      *ngFor="let number of allNumbers"
      [id]="number"
      [ngClass]="{
        inactive:
          number !== wrapNumber(riskAppetiteScore + 1) &&
          number !== wrapNumber(riskAppetiteScore - 1) &&
          number !== riskAppetiteScore,
        left: number === wrapNumber(riskAppetiteScore - 1),
        right: number === wrapNumber(riskAppetiteScore + 1),
        active: number === riskAppetiteScore
      }"
      class="number"
    >
      {{ number * 10 }}
    </div>
  </div>
  <div class="arrow-text arrow right" (click)="next()">
    <button mat-icon-button>
      <mat-icon>keyboard_arrow_right</mat-icon>
    </button>
  </div>
</div>

<div class="custom-indicators">
  <div
    *ngFor="let number of numbers"
    class="custom-indicator"
    [class.active]="number === riskAppetiteScore"
  ></div>
</div>
<div id="warning-text">
  <strong>{{ warningTitle }}</strong>
  <p>{{ warningContent }}</p>
</div>
