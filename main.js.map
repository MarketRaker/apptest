<div class="actions">
  <button class="btn-remove">
    <mat-icon (click)="openModal()">close</mat-icon>
  </button>
</div>

<div class="header">
  <div class="logo">
    <img
      [src]="tradingPair.icon"
      [alt]="tradingPair.tradingPairName + ' logo'"
    />
  </div>
  <div class="name">{{ tradingPair.tradingPairName }}</div>
</div>

<button class="btn-clear toggle" (click)="toggle()">
  Notifications
  <mat-icon>{{
    tradingPair.expanded ? "arrow_drop_up" : "arrow_drop_down"
  }}</mat-icon>
</button>

<div class="content" *ngIf="tradingPair.expanded">
  <div class="toggle-group">
    <mat-slide-toggle
      class="light"
      labelPosition="before"
      [(ngModel)]="tradingPair.notifications"
      (ngModelChange)="update()"
      >Notifications</mat-slide-toggle
    >

    <mat-slide-toggle
      labelPosition="before"
      [(ngModel)]="longNotifications"
      (ngModelChange)="update()"
      >Longs</mat-slide-toggle
    >

    <mat-slide-toggle
      labelPosition="before"
      [(ngModel)]="shortNotifications"
      (ngModelChange)="update()"
      >Shorts</mat-slide-toggle
    >
  </div>
</div>

<app-confirmation-modal
  *ngIf="showModal"
  (confirmed)="remove()"
  (dismissed)="closeModal()"
></app-confirmation-modal>
