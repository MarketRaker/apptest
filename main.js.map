<app-navbar></app-navbar>
<div class="page">
  <div class="box-container">
    <div class="row-container">
      <div class="user-section">
        <div class="container">
          <div *ngIf="user" class="profile-banner">
              <div class="user">
                <div
                  class="avatar"
                  [ngStyle]="{ 'background-image': 'url(' + user.picture + ')' }"
                ></div>
                <div class="details">
                  <h2>{{ user.name }}</h2>
                  <p>{{ user.email }}</p>
                </div>
              </div>
          </div>
          <div class="sub-info">
            <p>Raker tokens: </p>
            <p>Subscription months left: </p>
            <button class="btn-solid btn-green">
              Buy Raker Tokens
            </button>
          </div>
        </div>
      </div>
      <div class="appetite-section">
        <div class="risk-app-content">
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
    <div class="save-settings">
      <app-settings-save></app-settings-save>
    </div>
    <button class="btn-solid btn-white ff-accent tt-uppercase">
      Sign Out
    </button>
  </div>
</div>
