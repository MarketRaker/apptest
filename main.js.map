<div class="modal" [class.open]="isOpen">
  <div class="container">
    <button 
        class="close-button" 
      >
        <mat-icon (click)="onCloseModal()">close</mat-icon>
      </button>
    <!-- Modal content -->
    <div class="modal-content">
      <h2>Connect Your Wallet</h2>

      <div class="btn-options">
        <button 
          class="toggle-btn"
          [class.active]="isButtonActive === 'mobile'" 
          (click)="toggleButton('mobile')"
        >
          Mobile
        </button>
        <button 
          class="toggle-btn"
          [class.active]="isButtonActive === 'qrcode'" 
          (click)="toggleButton('qrcode')"
        >
          QR Code
        </button>
      </div>
      <div class="preferred-wallet-text">
        <a
          class="navigation-label"
          routerLink="/trade/insufficient-tokens"
          routerLinkActive="active"
        >
          Choose your preferred wallet</a
        >
      </div>
    </div>
  </div>
</div>
