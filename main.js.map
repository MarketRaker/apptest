<ng-container *ngIf="user">
  <div class="container">
    <section>
      <div class="section-title section-title-center">
        <h2>Change your risk appetite</h2>
      </div>

      <app-risk-appetite-selector
        theme="user-profile"
        [riskAppetiteScore]="user.riskAppetiteScore"
        (riskAppetiteScoreChanged)="updateRiskAppetiteScore($event)"
      ></app-risk-appetite-selector>
    </section>
  </div>
</ng-container>
