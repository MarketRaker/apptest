<button class="btn-clear btn-dark icon-end">
  <mat-icon>chevron_left</mat-icon>
  <div 
    class="label"
    routerLink="/trade/indicators"
    routerLinkActive="active"
  >
    Go Back
</div>
</button>

<div class="container">
  <div class="settings-header-text">
    Your Market Settings
  </div>

  <div class="action-buttons">
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs"
    >
      + Add More Markets
    </button>
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs"
    >
      Notification Channels
    </button>
  </div>

  <div class="info-text">
    <strong>
      Click on the bell icon to enable/disable notifications for the selected market. 
      <br>
      To remove a market from your viewing list click on the "X".
    </strong>
  </div>

  <div class="filter-button-options">
    <div class="filter-buttons">
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
        (click)="filterNotifications('All')"
        [class.active]="filterString === ''"
      >
        All
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
        (click)="filterNotifications('Stocks')"
        [class.active]="filterString === 'Stocks'"
      >
        Stocks
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
        (click)="filterNotifications('Crypto')"
        [class.active]="filterString === 'Crypto'"
      >
        Crypto
      </button>
    </div>
  </div>

  <div class="search-options">
    <div class="search">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search" />
    </div>

    <button
      [matMenuTriggerFor]="filterMenu"
      class="btn-clear filter-btn icon-start"
    >
      <mat-icon>filter_alt</mat-icon>
      <div class="filter-by-label">Filter by</div>
    </button>
    <mat-menu #filterMenu>
      <menu mat-menu-item>Option</menu>
      <menu mat-menu-item>Option</menu>
    </mat-menu>
  </div>

  <div class="grid">
    <app-notification-card
      *ngFor="let pair of filteredTradingPairNotifications"
      [tradingPair]="pair"
    ></app-notification-card>
  </div>
</div>
