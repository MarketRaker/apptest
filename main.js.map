<div class="modal">
    <div class="modal-content">
        <p>Are you sure you want to remove this pair from your watchlist?</p>
        <div class="modal-buttons">
            <button class="btn-cancel" (click)="dismiss()">Cancel</button>
            <button class="btn-yes" (click)="confirm()">Yes</button>
        </div>
    </div>
</div>
