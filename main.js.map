<!-- Result Grid -->
<div *ngIf="results && results.length > 0" class="container">
  <div class="results-header">
    <h2>Search Results</h2>
    <a
      class="navigation-label"
      (click)="navigateToSuggestions()"
    >
      <div class="trading-pair-suggestion-link">View trading pair suggestions</div></a
    >
    <p>Select pairs to add to your watchlist</p>
  </div>
  <div class="grid">
    <app-trade-pair-card
      *ngFor="let result of results"
      [card]="result"
      (selected)="select(result)"
    >
    </app-trade-pair-card>
  </div>
</div>
<!-- End Result Grid -->

<!-- No Results -->
<div *ngIf="results && results.length === 0" class="container">
  <div class="results-header">
    <h2>No Results</h2>
    <p>Try searching for a different pair.</p>
  </div>
</div>
<!-- End No Results -->
