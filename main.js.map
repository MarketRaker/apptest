<div class="container">
  <div class="header">
    <h1>Almost done!</h1>
    <h2>Start trading with confidence</h2>
  </div>

  <div class="signup-container">
    <p>Sign up with your</p>

    <button
      class="btn-google-account"
      (click)="
        auth.loginWithRedirect({
          authorizationParams: { connection: 'google-oauth2' },
          appState: { target: redirectURL }
        })
      "
    >
      <img src="../../../../../assets/images/google.png" alt="" />
      Google Account
    </button>
  </div>
  <div class="divider">
    <span>Or sign up with</span>
  </div>

  <div class="icon-container">
    <a
      href="https://www.linkedin.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div
        class="icon-wrapper"
        matRipple
        [matRippleColor]="'rgba(0, 0, 0, 0.1)'"
      >
        <fa-icon size="3x" color="#007BB6" [icon]="faLinkedin"></fa-icon>
      </div>
    </a>
    <a
      href="https://www.facebook.com"
      target="_blank"
      rel="noopener noreferrer"
    >
      <div
        class="icon-wrapper"
        matRipple
        [matRippleColor]="'rgba(0, 0, 0, 0.1)'"
      >
        <fa-icon size="3x" [icon]="faFacebook"></fa-icon>
      </div>
    </a>
  </div>

  <div id="signup-email-text">Sign up by using your email address</div>

  <div id="already-have-account-text">
    Already have an account? Sign in <a routerLink="/login">here</a>
  </div>
</div>

<div class="actions">
  <button
    routerLink="/registration/discover"
    class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
  >
    Back
  </button>
</div>
