<div class="container">
  <div class="filter-buttons">
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
      (click)="filterListBtn('')"
      [class.active]="filterString === ''"
    >
      All
    </button>
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
      (click)="filterListBtn('stocks')"
      [class.active]="filterString === 'stocks'"
    >
      Stocks
    </button>
    <button 
      class="btn-solid btn-white tt-uppercase ff-accent fs-lg"
      (click)="filterListBtn('crypto')"
      [class.active]="filterString === 'crypto'"
    >
      Crypto
    </button>
  </div>
</div>

<div class="search-filter">
  <div class="search">
    <mat-icon>search</mat-icon>
    <input type="text" placeholder="Search" [(ngModel)]="searchFilterString" />
  </div>
  <div class="to-market-settings">
    <button class="btn-clear btn-white">
      <a
      class="navigation-label"
      routerLink="/trade/settings"
      routerLinkActive="active"
      >
      <div class="label">Your Market Settings</div></a
      >
    </button>
  </div>
</div>

<div class="selection-list">
  <div class="header">
    <h3>Trading Pairs I Watch</h3>
  </div>
  <div class="list" *ngIf="tradePairs" #list>
    <app-trade-avatar
      *ngFor="let pair of tradePairs | filter : searchFilterString"
      [tradingPair]="pair"
      (click)="toggle(pair)"
    ></app-trade-avatar>
  </div>
</div>

<div class="see-all">
  <a
      routerLink="/discover"
      routerLinkActive="active"
    >
      <button class="btn-clear btn-dark icon-end">
        <div class="label">See All Trading Pairs</div>
        <mat-icon>chevron_right</mat-icon>
      </button></a
    >
</div>
