<div class="hero">
  <div class="container">
    <h1 class="title">Discover Trading Pairs</h1>
    <p>Add more trading pairs to your watch list</p>
  </div>
</div>

<!-- Search -->
<div class="search" [ngClass]="{ focus: searchHasFocus }">
  <input
    type="text"
    placeholder="Search Trading Pairs"
    (focus)="focus()"
    (blur)="blur()"
    [(ngModel)]="searchTerm"
    (keyup.enter)="search()"
  />
  <button class="btn-search" (click)="search()">
    <mat-icon *ngIf="!loading">search</mat-icon>
    <mat-icon *ngIf="loading" svgIcon="puff"></mat-icon>
  </button>
</div>

<!-- Filter Buttons -->
<div class="filter-buttons">
  <button 
    class="btn-solid btn-white tt-uppercase ff-accent"
  >
    All
  </button>
  <button 
    class="btn-solid btn-white tt-uppercase ff-accent"
  >
    Stocks
  </button>
  <button 
    class="btn-solid btn-white tt-uppercase ff-accent"
  >
    Crypto
  </button>
</div>

<!-- Suggestions -->
<div class="container">
  <section *ngIf="!showWatchlist && !showResults">
    <p>Suggestions</p>
    <div class="suggestions-filter-buttons">
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        All
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Stocks
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Crypto
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Popular
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Customized
      </button>
    </div>
    <a
      class="navigation-label"
      (click)="toggleWatchlist()"
    >
      <div class="my-trading-pairs-link">View trading pairs I watch</div></a
    >
    <div class="trading-pair-suggesstions">
      <app-trade-pair-card
        *ngFor="let card of suggestions"
        [card]="card"
        (selected)="onSuggestionCardSelected($event)"
      >
      </app-trade-pair-card>
    </div>
  </section>

  <!-- Trading Pairs I Watch -->
  <section *ngIf="!showResults && showWatchlist">
    <p>Trading Pairs I Watch</p>
    <div class="suggestions-filter-buttons">
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        All
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Stocks
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Crypto
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Popular
      </button>
      <button 
        class="btn-solid btn-white tt-uppercase ff-accent"
      >
        Customized
      </button>
    </div>
    <a
      class="navigation-label"
      (click)="toggleWatchlist()"
    >
      <div class="suggestions-trading-pairs-link">View suggestion trading pairs</div></a
    >
    <div class="trading-pair-suggesstions">
      <app-trade-pair-card
        *ngFor="let card of watchList"
        [card]="card"
        (click)="removeFromWatchList(card)"
      >
      </app-trade-pair-card>
    </div>
  </section>
  <!-- End Trading Pairs I Watch -->

</div>
<!-- End Suggestions -->

<!-- Search Results -->
<app-results
  *ngIf="showResults"
  [results]="results"
  (selected)="updateSelected($event)"
></app-results>
<div class="actions" *ngIf="selected.length > 0">
  <button
    class="btn-solid btn-white"
    [disabled]="!selected || selected.length === 0"
    (click)="addToWatchList()"
  >
    <div class="label">
      Add to my watch list <span class="count">{{ selected.length }}</span>
    </div>
  </button>
</div>
<!-- End Search Results -->
